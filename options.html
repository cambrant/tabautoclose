<!doctype html>
<html>
  <head>
    <title>options</title>
    <style>
      body {
        padding: 3px;
      }
      textarea {
        overflow-wrap: normal;
        overflow-x: scroll;
      }
      #savebtn {
        text-align: center;
        margin-left: 40%;
        width: 20%;
        margin-top: 5px;
        margin-bottom: 2px;
      }
      #exportbtn {
        text-align: center;
        margin-left: 40%;
        width: 20%;
        margin-top: 5px;
        margin-bottom: 2px;
      }
      #importbtn {
        text-align: center;
        margin-left: 40%;
        width: 20%;
        margin-top: 5px;
        margin-bottom: 2px;
      }
      #actions {
        margin-top: 8px;
        text-align: center;
      }
      #actions button {
        margin: 0 4px;
        min-width: 8rem;
      }
      #importfile {
        display: none;
      }
      #status {
        min-height: 1.2em;
        margin-top: 8px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <fieldset>
      <legend>
        <b>#Tabs to keep</b>
        <abbr
          title="tabs to keep open, last access time determines closing order"
          >(?)</abbr
        >
      </legend>
      <input type="number" id="closeThreshold" value="7" min="0" />
    </fieldset>

    <fieldset>
      <legend>
        <b>Auto Save</b>
        <abbr title="save auto closed tabs as bookmarks">(?)</abbr>
      </legend>

      <select id="saveFolder">
        <option value="">Select a bookmark save folder to enable</option>
      </select>
    </fieldset>

    <fieldset>
      <legend>
        <b>Tab Filters</b>
        <abbr title="Choose which types of tabs can be auto-closed">(?)</abbr>
      </legend>
      <label id="closeActiveLabel" hidden><input type="checkbox" id="closeActive" />Close active tabs</label><br />
      <label><input type="checkbox" id="closeAudible" />Close audible tabs</label><br />
      <label><input type="checkbox" id="closePinned" />Close pinned tabs</label>
    </fieldset>

    <fieldset>
      <legend>
        <b>Close Rules </b>
        <abbr title="Format: CloseTime (seconds), Container (regex) | URL (regex)">(?)</abbr>
      </legend>
      <textarea
        id="intervalrules_seconds_and_container_regex"
        style="resize: none; float: left; width: 50%; height: 12em"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        placeholder="# CloseTime (seconds), Container (regex)
# Examples:
# 10s, no container
10,
# 20s, any container
20,.*
# 1s Tmp container
1,^Tmp$
"
      ></textarea>
      <textarea
        id="intervalrules_url_regex"
        style="resize: none; width: 50%; height: 12em"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        placeholder="# 'URL (regex)'
# Examples:
# any http/s URL
^https?:\/\/.*
# new tab page
^about:newtab
# any about page
^about:.*
"
      ></textarea>
    </fieldset>

    <fieldset>
      <legend>
        <b>Ignore Rules</b>

        <abbr title="Format: Container (regex) | URL (regex)">(?)</abbr>
      </legend>
      <textarea
        id="ignorerules_container_regex"
        style="float: left; resize: none; width: 50%; height: 12em"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        placeholder="# Enter 'Container (regex)' here
# Examples:
#                  := no container
#  .*              := any container
#  ^Personal$      := exact Match with Personal container
#  ^Tmp.*          := container starting with Tmp
"
      ></textarea>
      <textarea
        id="ignorerules_url_regex"
        style="resize: none; width: 50%; height: 12em"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        placeholder="# Enter 'URL (regex)' here
# Examples:
#  ^https?:\/\/    := any http/s URL
#  ^about:newtab   := new tab page
#  ^about:blank    := blank tab
#  ^about:.*       := any about page
"
      ></textarea>
    </fieldset>
    <div id="actions">
      <button id="savebtn" type="button">Save</button>
      <button id="exportbtn" type="button">Export</button>
      <button id="importbtn" type="button">Import</button>
    </div>
    <input id="importfile" type="file" accept="application/json,.json" />
    <div id="status" aria-live="polite"></div>
    <script src="options.js"></script>
  </body>
</html>
